<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            width: 1920px;
            height: 1080px;
        }

        .box {
            background-color: #ca785c;
            width: 320px;
            height: 80px;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
        }

        p {
            color: white;
            flex-direction: row;
            padding-left: 20px;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div class="box">
        <p>봄</p>
        <p>여름</p>
        <p>가을</p>
        <p>겨울</p>
    </div>
</body>

</html>
