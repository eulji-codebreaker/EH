<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 1-8 */
        body {
            position: relative;
            width: 1920px;
            height: 1080px;
            background: #FFFFFF;
        }

        * {
            box-sizing: border-box;
        }

        /* Frame 4 */
        .e8 {
            position: absolute;
            width: 160px;
            height: 240px;
            left: 16px;
            top: 16px;

            background: #CA785C;
            border-radius: 4px;
        }

        /* Frame 17 */
        .pic {
            position: absolute;
            width: 160px;
            height: 172px;
            left: 0px;
            top: 0px;

            background: #FFFFFF;
        }

        /* 36d2cdeabb55cc8256a88dcd155388ae 1 */
        .e888 {
            position: absolute;
            width: 564px;
            height: 1007px;
            left: -221px;
            top: -471px;
            background: url(source/a16fabed86eeb187c1e5f8823914fafb06da4634.jpg);
        }

        /* 인테리어란? */
        #tl {
            position: absolute;
            width: 83px;
            height: 19px;
            left: 8px;
            top: 180px;

            font-family: 'Inter';
            font-style: normal;
            font-weight: 700;
            font-size: 16px;
            line-height: 19px;
            letter-spacing: -0.005em;

            color: #FFFFFF;
        }


        /* 김작가 */
        #bl {
            position: absolute;
            width: 39px;
            height: 17px;
            left: 8px;
            top: 215px;

            font-family: 'Inter';
            font-style: normal;
            font-weight: 700;
            font-size: 14px;
            line-height: 17px;
            /* identical to box height */
            letter-spacing: -0.005em;

            color: #FFFFFF;
        }


        /* 2024.01.01 */
        #br {
            position: absolute;
            width: 76px;
            height: 17px;
            left: 76px;
            top: 215px;

            font-family: 'Inter';
            font-style: normal;
            font-weight: 700;
            font-size: 14px;
            line-height: 17px;
            /* identical to box height */
            letter-spacing: -0.005em;

            color: #FFFFFF;
        }
    </style>
</head>

<body>

    <div class="e8"></div>

    <div class="pic"></div>
    <div class="e88"></div>
    <div class="e888"></div>
    <p id="tl">인테리어란?</p>
    <p id="bl">김작가</p>
    <p id="br">2024.01.01</p>
