<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
        }

        #box {
            position: absolute;
            left: 16px;
            top: 16px;
            width: 297px;
            height: 35px;
            background: #FFB9B9;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            padding: 8px 16px;
            gap: 16px;
            box-sizing: border-box;
        }

        #text1 {
            width: 45px;
            height: 19px;
            font-weight: 700;
            font-size: 16px;
            line-height: 19px;
            color: white;
        }

        #cir1 {
            width: 4px;
            height: 4px;
            background: #D9D9D9;
            border-radius: 50%;
        }

        #text2 {
            width: 74px;
            height: 19px;
            font-weight: 700;
            font-size: 16px;
            line-height: 19px;
            color: white;
        }

        #cir2 {
            width: 4px;
            height: 4px;
            background: #D9D9D9;
            border-radius: 50%;
        }

        #text3 {
            width: 74px;
            height: 19px;
            font-weight: 700;
            font-size: 16px;
            line-height: 19px;
            color: white;
        }
    </style>
</head>

<body>
    <div id="box">
        <div id="text1">웹툰홈</div>
        <div id="cir1"></div>
        <div id="text2">요일별웹툰</div>
        <div id="cir2"></div>
        <div id="text3">베스트도전</div>
    </div>
</body>

</html>
