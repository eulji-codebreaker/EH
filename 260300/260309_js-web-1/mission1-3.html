<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            gap:15px;
        }
        div{
            width: 500px;
        }
        #highlight{
            background-color: yellow;
        }
        .item{
            border-left: 2px solid blue;
            background-color: lightgray;
            height:50px;
            line-height: 50px;
        }
        #group{
            display: flex;
            flex-direction: column;
            gap:12px;
        }
        #buttons{
            display: flex;
            flex-direction: row;
            justify-content: space-around;
        }
        button{
            background-color: skyblue;
            color:white;
            width:150px;
            height:50px;
            border: 0px;
        }
        button:hover{
            background-color: blue;
            cursor: pointer;
        }
        .box{
            background-color: lightgray;
            height:80px;
            border-radius: 8px;
            border: 3px solid gray;
            font-size: 140%;
            line-height: 80px;
        }
    </style>
</head>
<body>
    <div class="box">첫 번째 박스</div>
    <div class="box">두 번째 박스</div>
    <div class="box" id="highlight">세 번째 박스 (하이라이트)</div>
    <div id="group"> 
        <div class="item">첫 번째 아이템</div>
        <div class="item">두 번째 아이템</div>
        <div class="item">세 번째 아이템</div>
        <div class="item">네 번째 아이템</div>
    </div>
    <div id="highlight">하이라이트된 문단입니다.</div>
    <div id="buttons">
        <button onclick="allBox();">모든 박스 선택</button>
        <button onclick="allItem();">모든 아이템 선택</button>
        <button onclick="highlight();">하이라이트 요소를 선택</button>
    </div>

    <script>
        function allBox(){
            const $box=document.querySelectorAll('.box');
            $box.forEach((li)=>{
                li.style.backgroundColor='pink';
            });
        }
        function allItem(){
            const $group=document.querySelectorAll('.item');
            $group.forEach((li)=>{
                li.style.backgroundColor='lightgreen';
                li.style.borderLeft='3px solid green';
            })
        }
        function highlight(){
            const $highlight=document.querySelectorAll('#highlight');
            $highlight.forEach((li)=>{
                li.style.fontWeight=900;
                li.style.backgroundColor='pink';
                li.textContent=`${li.textContent} (수정됨)`;
            })
        }
    </script>
</body>
</html>
