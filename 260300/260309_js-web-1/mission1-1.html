<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            padding:10px;
            border:1px solid black;
            width:400px;
            margin-bottom: 10px;
            line-height: 100%;
        }
        p{
            width:400px;
            height:50px;
        }
        #box{
            width:400px;
            display: flex;
            justify-content: left;
            gap:10px;
            margin:0;
            padding:0;
        }
        button{
            width:120px;
            height:50px;
            background-color: blue;
            color: white;
            line-height: 100%;
        }
        button:hover{
            background-color: darkblue;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class='box' class='changed' id="box1">첫번째 박스입니다.</div>
    <div class='box' id="box2">두번째 박스입니다.</div>
    <p>여기에 메시지가 표시됩니다.</p>
    <div id="box">
        <button onclick="firstButton();">첫 번째 박스 선택</button>
        <button onclick="secondButton();">두 번째 박스 선택</button>
        <button onclick="messageSelect();">메시지 선택</button>
    </div>

    <script>
        function firstButton(){
            const $box1=document.getElementById('box1');
            $box1.style.backgroundColor='pink';
            $box1.textContent='첫번째 박스를 찾았습니다';
        }
        function secondButton(){
            const $box2=document.getElementById('box2');
            $box2.style.backgroundColor='lightgreen';
            $box2.textContent='두번째 박스를 찾았습니다';
        }
        function messageSelect(){
            const $text=document.querySelector('p');
            $text.textContent='ID로 요소를 성공적으로 찾았습니다.'
            $text.style.color='blue';
            $text.style.fontWeight=900;
        }
    </script>
</body>
</html>
