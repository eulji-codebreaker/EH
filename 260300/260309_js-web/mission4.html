<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        .container {
            border: 2px solid #ddd;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
        }

        .box {
            padding: 10px;
            margin: 8px 0;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
        }

        .special {
            background-color: #fff3cd;
            border-color: #ffeaa7;
        }

        ul li {
            padding: 5px;
            margin: 3px 0;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 id="title">제목 영역</h2>
        <p class="box">첫 번째 박스</p>
        <p class="box special">두 번째 박스 (특별)</p>
        <p class="box">세 번째 박스</p>
    </div>

    <div class="container">
        <ul>
            <li>첫 번째 목록</li>
            <li class="special">두 번째 목록 (특별)</li>
            <li>세 번째 목록</li>
            <li>네 번째 목록</li>
        </ul>
    </div>

    <div class="container">
        <input type="text" placeholder="텍스트 입력" />
        <input type="email" placeholder="이메일 입력" />
        <button type="button">일반 버튼</button>
    </div>

    <div style="margin-top: 20px">
        <button onclick="selectById()">ID로 선택</button>
        <button onclick="selectByClass()">클래스로 선택</button>
        <button onclick="selectByTag()">태그로 선택</button>
        <button onclick="selectSpecial()">특별 클래스 선택</button>
        <button onclick="selectFirst()">첫 번째만 선택</button>
        <button onclick="selectAll()">모든 박스 선택</button>
        <button onclick="selectComplex()">복합 선택자</button>
        <button onclick="selectInput()">입력 필드 선택</button>
    </div>

    <script>
        function selectById() {
            const $title = document.getElementById('title');
            $title.style.color = 'red';
            $title.textContent = 'ID로 선택된 제목!';
        }
        function selectByClass() {
            const $box = document.querySelector(".box");
            $box.innerHTML = "클래스로 선택된 첫 번째 박스!";
            $box.style.backgroundColor = "lightgreen";
        }
        function selectByTag() {
            var $p = document.querySelector("p");
            $p.innerHTML = "태그로 선택된 첫 번째 p 요소!";
            $p.style.border = "2px solid #007bff";
        }
        function selectSpecial() {
            const $special = document.querySelectorAll(".special");

            $special.forEach((l, i) => {
                l.innerHTML = "특별 클래스 " + (i + 1) + "번!";
                l.style.fontWeight = "bold";
                l.style.color = "#856404";
            });
        }
        function selectFirst() {
            const $first = document.querySelector(".container>.box");
            $first.innerHTML = "첫 번째 컨테이너의 첫 번째 박스!";
            $first.style.backgroundColor = "#cce5ff";
        }
        function selectAll() {
            const $all = document.querySelectorAll(".box");
            $all.forEach((l, i) => {
                l.innerHTML = "모든 박스 " + (i + 1) + "번 변경!";
                l.style.backgroundColor = "#ffccff";
            })
        }
        function selectComplex() {
            const $complex = document.querySelectorAll(".container p.box:not(.special)");
            $complex.forEach((l) => {
                l.innerHTML = "복합 선택자로 선택됨!";
                l.style.backgroundColor = "#ccffcc";
                l.style.border = "2px dashed #28a745";
            })
        }
        function selectInput() {
            const $text = document.querySelector('input[type="text"]');
            const $email = document.querySelector('input[type="email"]');

            $text.value = "querySelector로 설정된 값";
            $text.style.backgroundColor = "#fff3cd";

            $email.value = "test@example.com";
            $email.style.backgroundColor = "#d1ecf1";
        }
    </script>
</body>

</html>
