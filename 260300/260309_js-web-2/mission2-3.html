<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #target {
            border: 2px solid blue;
            padding: 10px;
            margin: 10px;
        }

        .before {
            background: red;
            color: white;
        }

        .after {
            background: green;
            color: white;
        }

        .begin {
            background: orange;
        }

        .end {
            background: purple;
            color: white;
        }
    </style>
</head>

<body>
    <div id="target">
        <p>기존 내용</p>
    </div>
</body>

</html>
