<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            border: 2px solid #333;
            margin: 10px;
            padding: 10px;
            background-color: #f9f9f9;
        }

        .target {
            border: 2px solid blue;
            padding: 10px;
            margin: 5px;
            background-color: white;
        }

        .highlight {
            background-color: yellow;
            border: 1px solid red;
            padding: 3px;
            margin: 2px;
        }

        button {
            margin: 5px;
            padding: 5px 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="target" class="target">
            <span>기존 자식1</span>
            <span>기존 자식2</span>
        </div>

        <p>다른 형제 요소</p>
    </div>

    <div>
        <button onclick="testBefore()">before() 테스트</button>
        <button onclick="testAfter()">after() 테스트</button>
        <button onclick="testPrepend()">prepend() 테스트</button>
        <button onclick="testAppend()">append() 테스트</button>
        <button onclick="testAppendChild()">appendChild() 테스트</button>
        <button onclick="testStringInsert()">문자열 삽입 비교</button>
    </div>

    <script>
        const $container = document.querySelector('.container');
        const $target = document.querySelector('.target');
        function testBefore() {
            const $before = document.createElement("div");
            $before.textContent = "before()로 추가된 요소";
            $before.classList.add("highlight");
            $target.before($before);
        }
        function testAfter() {
            const $after = document.createElement("div");
            $after.textContent = "after()로 추가된 요소";
            $after.className = "highlight";
            $target.after($after);
        }
        function testPrepend() {
            const $prepend = document.createElement("div");
            $prepend.textContent = "prepend()로 추가된 요소";
            $prepend.className = "highlight";
            $target.prepend($prepend);
        }
        function testAppend() {
            const $append = document.createElement("div");
            $append.textContent = "append()로 추가된 요소";
            $append.className = "highlight";
            $target.append($append);
        }
        function testAppendChild() {
            const $child = document.createElement("div");
            $child.textContent = "appendChild()로 추가된 요소";
            $child.className = "highlight";
            $target.appendChild($child);
        }

        function testStringInsert() {
            $target.append("append()로 추가된 문자열");
            $target.prepend(123);
        }
    </script>
</body>

</html>
